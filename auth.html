<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login e Logout</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="auth.css">
</head>
<body>
<div class="card">
    <h1>Autenticação</h1>

    <label for="email">Email</label>
    <input id="email" type="email" placeholder="seu@email.com" />

    <label for="senha">Senha</label>
    <input id="senha" type="password" placeholder="Sua senha" />

    <div class="actions">
        <button id="btnLogin">Entrar</button>
        <button id="btnMe" class="secondary">Quem sou eu</button>
        <button id="btnLogout" class="danger">Sair</button>
    </div>

    <div id="status" class="status">Pronto para autenticar.</div>
    <p class="tip">Página de teste JWT: login salva token no navegador, /auth/me e /auth/logout usam Authorization Bearer.</p>
</div>

<script src="auth.js"></script>
</body>
</html>
